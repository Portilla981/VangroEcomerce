{% load static %}


<header class="header-vanagro">
  <div class="logo_gov">
    <img class="image_gov" src="{% static 'img/interfaz_vanagro/govco2.png'%}" alt="">
  </div>

  <div class="navbar-vanagro__container">

    <h1 class="navbar-vanagro__title">VANAGRO
      <span class="navbar-vanagro__subtitle">Mercado Campesino</span>
    </h1>

    <nav class="navbar-vanagro">
      <ul class="navbar-vanagro__list">

        <li class="navbar-vanagro__item navbar-vanagro__item--cart">
          <a href="" class="navbar-vanagro__link">Carrito</a>
        </li>
        <li class="navbar-vanagro__item navbar-vanagro__item--cart">
          <a href="" class="navbar-vanagro__link">Regresar</a>
        </li>
        <li class="navbar-vanagro__item navbar-vanagro__item--cart">
          <a href="" class="navbar-vanagro__link">Cerrar sesion</a>
        </li>
      </ul>
    </nav>

    <div class="navbar-vanagro__icons">

      <div class="navbar-vanagro__icons--first">        
        <a href="{% url 'ver_carrito' %}">
          <ion-icon class="navbar-vanagro__icons--cart" name="cart-outline"></ion-icon>          
        </a>
        <span id="carrito-contador" class="carrito-badge" {% if carrito_total_items == 0 %} style= "display:none;" {% endif %}>{{ carrito_total_items }}</span>
      </div>

      <div class="navbar-vanagro__icons--second">
        <a href="{{ request.session.volver_a|default:'/' }}">
          <ion-icon class="navbar-vanagro__icons--back" name="arrow-back-outline"></ion-icon>
        </a>
      </div>

      {% if user.usuario.fotografia %}
      <img class="navbar-vanagro__profile-img" src="{{ user.usuario.fotografia.url }}" alt="Foto del productor" />
      {% else %}
      <img class="navbar-vanagro__profile-img" src="{% static 'img/interfaz_vanagro/usuario_default.png' %}"
        alt="Foto del productor" />
      {% endif %}

      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit" style="background: none; border: none;">
          <ion-icon class="navbar-vanagro__icons--logout log-out" name="log-out-outline"
            href="{% url 'logout' %}"></ion-icon>
        </button>
      </form>

    </div>
  </div>

  <div class="popup" id="popupMessage">
    <div class="popup__header">
      <i class="fa-solid fa-check popup__icon"></i>
    </div>
    <div class="popup__body">
      <h3 class="popup__title">¡NOS VEMOS PRONTO!</h3>
      <p class="popup__message">¡Se ha cerrado la sesión exitosamente!</p>
      <p class="popup__time"><strong>Por favor espera un momento...</strong></p>
    </div>
  </div>
</header>
