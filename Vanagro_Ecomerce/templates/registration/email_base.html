<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    {% load static %}
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial;">

    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">

                <table width="500" style="background:white; padding:20px; border-radius:10px; margin-top:20px;">
                    
                    <!-- LOGO -->
                    <tr>
                        <td align="center">
                            {% comment %} <img src="{% static 'img/interfaz_vanagro/vanagro_logo_1.png' %}" alt="Vanagro Logo"> {% endcomment %}
                            <img src="{{ protocolo }}://{{ dominio }}/static/img/interfaz_vanagro/vanagro_1.png" alt="Vanagro Logo">
                            <h2 style="color:#2e7d32;">🌱 Vanagro</h2>
                        </td>
                    </tr>

                    <!-- CONTENIDO -->
                    <tr>
                        <td>
                            {% block content %}
                            {% endblock %}
                        </td>
                    </tr>

                    <!-- FOOTER -->
                    <tr>
                        <td align="center" style="font-size:12px; color:gray; padding-top:20px;">
                            {% include 'components/footer_vanagro.html' %}
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
