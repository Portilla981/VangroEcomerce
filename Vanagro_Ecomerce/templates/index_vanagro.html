<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="{% static 'js/cerrar_sesion.js' %}" defer></script>
    <script src="{% static 'js/alertas/notificacion.js' %}" defer></script>
    <!-- <script src="{% static 'js/alertas/espera_interfaz.js' %}" defer></script> -->

    <script src="{% static 'js/carrito/acciones_carrito.js' %}" defer></script>
    <script src="{% static 'js/alertas/alert-sent.js' %}" defer></script>


    {% block script %}

    {% endblock script %}


    <title>{{ titulo }}</title>

</head>

<body>

    <!-- <div class="layout"> -->
    {% block navbar %}

    {% include 'components/navbar_vanagro.html' %}

    {% endblock navbar %}
    
    <div class="contenido_general">
    {% block contenido %}
    
    {% endblock contenido %}
    </div>

    <div id="popup" class="popup-overlay">     

        <div class="popup-box popup__body">
            <div class="popup__header">
                <i class="fa-solid fa-check popup__icon"></i>
            </div>
            <h3 class="popup__title" id="popup-titulo"></h3>

            <p class="popup__message" id="popup-mensaje"></p>

            <button onclick="cerrarPopup()">Cerrar</button>
            <p class="popup__time"><strong>Por favor espera un momento...</strong></p>

        </div>
    </div>


    {% include 'components/footer_vanagro.html' %}

    <!-- </div> -->


</body>
